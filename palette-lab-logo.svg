<svg width="680" height="230" viewBox="0 0 680 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="logo-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.7" fill="#00ff9f" fill-opacity="0.045"/>
    </pattern>
    <pattern id="logo-lines" width="1" height="5" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="#000000" fill-opacity="0.13"/>
    </pattern>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    @keyframes logo-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    #logo-cur { animation: logo-blink 0.8s step-end infinite; }
  </style>

  <!-- Background -->
  <rect width="680" height="230" fill="#0a0a0f"/>
  <rect width="680" height="230" fill="url(#logo-dots)"/>
  <rect width="680" height="230" fill="url(#logo-lines)"/>

  <!-- Grid drop-shadow -->
  <rect x="40" y="68" width="134" height="109" fill="#000000" opacity="0.5"/>

  <!-- PIXEL GRID ICON — 5x4 color spectrum -->
  <!-- Row 0: Red to Yellow -->
  <rect x="42" y="70" width="22" height="22" fill="#ff2244"/>
  <rect x="67" y="70" width="22" height="22" fill="#ff6622"/>
  <rect x="92" y="70" width="22" height="22" fill="#ff9900"/>
  <rect x="117" y="70" width="22" height="22" fill="#ffcc00"/>
  <rect x="142" y="70" width="22" height="22" fill="#ffee22"/>
  <!-- Row 1: Yellow-Green to Cyan to Blue -->
  <rect x="42" y="95" width="22" height="22" fill="#88ee00"/>
  <rect x="67" y="95" width="22" height="22" fill="#22cc44"/>
  <rect x="92" y="95" width="22" height="22" fill="#00cc88"/>
  <rect x="117" y="95" width="22" height="22" fill="#00ddcc"/>
  <rect x="142" y="95" width="22" height="22" fill="#00aaff"/>
  <!-- Row 2: Blue to Violet to Magenta -->
  <rect x="42" y="120" width="22" height="22" fill="#2266ff"/>
  <rect x="67" y="120" width="22" height="22" fill="#6633ff"/>
  <rect x="92" y="120" width="22" height="22" fill="#aa11ff"/>
  <rect x="117" y="120" width="22" height="22" fill="#dd22aa"/>
  <rect x="142" y="120" width="22" height="22" fill="#ff0088"/>
  <!-- Row 3: App signature colors -->
  <rect x="42" y="145" width="22" height="22" fill="#ff009f"/>
  <rect x="67" y="145" width="22" height="22" fill="#33ffb8"/>
  <rect x="92" y="145" width="22" height="22" fill="#ff3c5a"/>
  <rect x="117" y="145" width="22" height="22" fill="#c8c8e8"/>
  <rect x="142" y="145" width="22" height="22" fill="#14141f" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Grid outer frame -->
  <rect x="36" y="64" width="134" height="109" fill="none" stroke="#2a2a4a" stroke-width="3"/>
  <rect x="37" y="65" width="132" height="107" fill="none" stroke="#4a4a7a" stroke-width="1" opacity="0.35"/>

  <!-- Corner brackets: top pink, bottom green -->
  <polyline points="36,78 36,64 50,64"      fill="none" stroke="#ff009f" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="156,64 170,64 170,78"   fill="none" stroke="#ff009f" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="36,159 36,173 50,173"   fill="none" stroke="#33ffb8" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="156,173 170,173 170,159" fill="none" stroke="#33ffb8" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Text shadows -->
  <text x="203" y="105" font-family="'Press Start 2P', monospace" font-size="22" fill="#000000" opacity="0.6">PALETTE</text>
  <text x="203" y="183" font-family="'Press Start 2P', monospace" font-size="54" fill="#000000" opacity="0.6">LAB</text>

  <!-- PALETTE -->
  <text x="200" y="102" font-family="'Press Start 2P', monospace" font-size="22" fill="#ff009f">PALETTE</text>

  <!-- Separator -->
  <rect x="200" y="112" width="380" height="2" fill="#2a2a4a"/>
  <rect x="200" y="112" width="165" height="1" fill="#ff009f" opacity="0.55"/>

  <!-- LAB -->
  <text x="200" y="180" font-family="'Press Start 2P', monospace" font-size="54" fill="#33ffb8">LAB</text>

  <!-- Blinking cursor -->
  <rect id="logo-cur" x="362" y="140" width="14" height="44" fill="#33ffb8"/>

  <!-- Tagline -->
  <text x="202" y="206" font-family="'Press Start 2P', monospace" font-size="7" fill="#4a4a7a" letter-spacing="3.5">COLOR SPACE EXPLORER</text>

  <!-- Outer frame corner brackets -->
  <polyline points="16,4 4,4 4,16"          fill="none" stroke="#ff009f" stroke-width="1.5" stroke-linecap="square" opacity="0.5"/>
  <polyline points="664,4 676,4 676,16"     fill="none" stroke="#ff009f" stroke-width="1.5" stroke-linecap="square" opacity="0.5"/>
  <polyline points="16,226 4,226 4,214"     fill="none" stroke="#33ffb8" stroke-width="1.5" stroke-linecap="square" opacity="0.5"/>
  <polyline points="664,226 676,226 676,214" fill="none" stroke="#33ffb8" stroke-width="1.5" stroke-linecap="square" opacity="0.5"/>
</svg>
